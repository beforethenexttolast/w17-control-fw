; PlatformIO project configuration for the W17 ESP32 #1 "control" firmware.
; See CLAUDE.md for the full hardware/functional brief.

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
build_unflags =
    -std=gnu++11

; Wokwi simulation build (validation Stage 2): identical to esp32dev plus the
; scripted CRSF self-feeder (src/SimCrsfFeeder.cpp) and a serial status print.
; The ${...} interpolation is mandatory: a child build_flags REPLACES the
; parent's, it does not append. See docs/SIMULATION.md.
[env:esp32dev_sim]
extends = env:esp32dev
build_flags =
    ${env:esp32dev.build_flags}
    -DW17_SIM_CRSF_FEEDER

; Host-side ("no hardware attached") environment for Unity unit tests over the
; pure-logic libs (crsf, failsafe, outputs). Hardware-touching code lives in the
; *_hal_esp32 libs, which are referenced only from src/main.cpp, never from test/.
[env:native]
platform = native
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
test_framework = unity
; Explicit (not relying on a version-specific default): never compile src/main.cpp
; (it includes Arduino.h) into the native test binary.
test_build_src = no
; Belt-and-suspenders: hard-exclude the esp32-only HAL libs from this env's
; Library Dependency Finder, even if something accidentally includes them.
lib_ignore =
    crsf_hal_esp32
    outputs_hal_esp32
    telemetry_hal_esp32
    link2_hal_esp32
